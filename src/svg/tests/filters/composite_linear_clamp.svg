<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <filter id="xor-clamp" x="0" y="0" width="100%" height="100%">
      <feFlood flood-color="white" flood-opacity="0.25" result="source"/>
      <feFlood flood-color="white" flood-opacity="0.25" result="mix"/>
      <feComposite in="source" in2="mix" operator="xor"/>
    </filter>
    <filter id="dodge-clamp" x="0" y="0" width="100%" height="100%">
      <feFlood flood-color="white" flood-opacity="0.9960784314" result="source"/>
      <feFlood flood-color="rgb(12,0,0)" flood-opacity="0.9568627451" result="mix"/>
      <feComposite in="source" in2="mix" operator="dodge"/>
    </filter>
  </defs>
  <rect width="200" height="100" fill="black"/>
  <rect width="100" height="100" filter="url(#xor-clamp)"/>
  <rect x="100" width="100" height="100" filter="url(#dodge-clamp)"/>
</svg>
