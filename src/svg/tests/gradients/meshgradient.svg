<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 100 100">
  <defs>
    <meshgradient id="mesh" x="0" y="0" gradientUnits="userSpaceOnUse">
      <meshrow>
        <meshpatch>
          <stop path="C 17 0 33 0 50 0" stop-color="rgb(255,255,255)"/>
          <stop path="C 50 33 50 66 50 100" stop-color="rgb(255,255,255)"/>
          <stop path="C 33 100 17 100 0 100" stop-color="rgb(0,0,255)"/>
          <stop path="C 0 66 0 33 0 0" stop-color="rgb(255,0,0)"/>
        </meshpatch>
        <meshpatch>
          <stop path="C 67 0 83 0 100 0" stop-color="rgb(0,255,0)"/>
          <stop path="C 100 33 100 66 100 100" stop-color="rgb(255,255,0)"/>
          <stop path="C 83 100 67 100 50 100" stop-color="rgb(255,255,255)"/>
        </meshpatch>
      </meshrow>
    </meshgradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" fill="url(#mesh)"/>
</svg>
