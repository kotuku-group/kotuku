
<svg version="1.1" width="100%" height="100%" viewBox="0 0 480 510"
  xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- Easing is a feature specific to Kotuku's SVG implementation -->

  <linearGradient id="GDefault" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="linear">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GIn" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="in">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GOut" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="out">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GInOut" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="inOut">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GCubicIn" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="cubicIn">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GCubicOut" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="cubicOut">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <linearGradient id="GCubicInOut" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0" easing="cubicInOut">
    <stop stop-color="black" offset="0"/>
    <stop stop-color="white" offset="1"/>
  </linearGradient>

  <rect x="20" y="20" width="440" height="40" fill="url(#GDefault)"/>
  <text font-size="12" x="20" y="75">Linear easing</text>

  <rect x="20" y="90" width="440" height="40" fill="url(#GIn)"/>
  <text font-size="12" x="20" y="145">In easing</text>

  <rect x="20" y="160" width="440" height="40" fill="url(#GOut)"/>
  <text font-size="12" x="20" y="215">Out easing</text>

  <rect x="20" y="230" width="440" height="40" fill="url(#GInOut)"/>
  <text font-size="12" x="20" y="285">In Out easing</text>

  <rect x="20" y="300" width="440" height="40" fill="url(#GCubicIn)"/>
  <text font-size="12" x="20" y="355">Cubic In easing</text>

  <rect x="20" y="370" width="440" height="40" fill="url(#GCubicOut)"/>
  <text font-size="12" x="20" y="425">Cubic Out easing</text>

  <rect x="20" y="440" width="440" height="40" fill="url(#GCubicInOut)"/>
  <text font-size="12" x="20" y="495">Cubic In Out easing</text>

  <rect id="test-frame" x="1" y="1" width="478" height="508" fill="none" stroke="#000000"/>
</svg>
