<?xml version="1.0" standalone="no"?>
<svg width="600" height="600" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <diffusionGradient id="dg" gradientUnits="userSpaceOnUse" gradientTransform="translate(2 3)" color-interpolation="linearRGB">
      <!-- Curve from top to bottom, splits the left and right sides -->
      <curve d="M 50,0 C 45,35 55,65 50,100" left-start="#ff0000" left-end="#ff8000" right-start="#0000ff" right-end="rgb(0,0,128)"/>
      <!-- Straight line on left -->
      <curve d="M 10,50 L 40,50" left-start="rgb(255,255,0,0.5)" left-end="#00ff00" right-start="#00ffff"/>
      <!-- Curvy line on right -->
      <curve d="M 60,50 C 70,40 80,60 90,50" left-start="#ff00ff"/>
    </diffusionGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" fill="url(#dg)"/>
</svg>
